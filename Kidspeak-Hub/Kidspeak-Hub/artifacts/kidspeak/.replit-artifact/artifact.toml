kind = "web"
previewPath = "/"
title = "Kidspeak LMS"
version = "1.0.0"
id = "artifacts/kidspeak"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23566

[services.development]
run = "pnpm --filter @workspace/kidspeak run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kidspeak", "run", "build" ]
publicDir = "artifacts/kidspeak/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23566"
BASE_PATH = "/"
